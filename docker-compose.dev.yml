version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: arthos
      POSTGRES_PASSWORD: arthos_dev
      POSTGRES_DB: arthos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arthos -d arthos"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
