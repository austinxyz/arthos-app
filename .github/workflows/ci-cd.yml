name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Temporarily disabled - tests will run but won't block deployment
    continue-on-error: true
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install curl for health checks
        sudo apt-get update && sudo apt-get install -y curl || true
    
    - name: Install Playwright browsers
      run: |
        playwright install --with-deps chromium
    
    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      run: |
        pytest tests/ -v --tb=short -k "not browser and not e2e"
    
    - name: Run browser tests
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      run: |
        # Start the server in background for browser tests
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        SERVER_PID=$!
        
        # Wait for server to be ready
        echo "Waiting for server to start..."
        for i in {1..30}; do
          if curl -f http://localhost:8000/ > /dev/null 2>&1; then
            echo "Server is ready!"
            break
          fi
          sleep 1
        done
        
        # Verify server is actually running
        if ! curl -f http://localhost:8000/ > /dev/null 2>&1; then
          echo "ERROR: Server failed to start!"
          exit 1
        fi
        
        # Run browser tests (including E2E tests which use live_server_url)
        EXIT_CODE=0
        pytest tests/ -v --tb=short -k "browser or e2e" || EXIT_CODE=$?
        
        # Stop the server
        kill $SERVER_PID 2>/dev/null || true
        wait $SERVER_PID 2>/dev/null || true
        
        # Exit with test result
        exit $EXIT_CODE

  # Deployment is handled automatically by Railway's GitHub integration
  # No need for manual deployment job - Railway deploys on push to main

