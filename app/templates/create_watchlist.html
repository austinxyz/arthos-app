<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create WatchList - Arthos</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/arthos-favicon.svg">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        body {
            background-color: #f5f5f5;
            padding: 0;
            margin: 0;
        }

        .header h1 {
            color: #4285f4;
        }

        .error-message {
            color: #d93025;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    {% set current_page = 'watchlists' %}
    {% include 'partials/navbar.html' %}
    <div class="container">
        <div class="header mb-4">
            <a href="/watchlists" class="text-decoration-none text-primary mb-2 d-inline-block">← Back to WatchLists</a>
            <h1>Create New WatchList</h1>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <form id="createWatchListForm" onsubmit="handleSubmit(event)">
                            <div class="mb-3">
                                <label for="watchlistName" class="form-label">WatchList Name</label>
                                <input type="text" class="form-control" id="watchlistName" name="watchlist_name"
                                    placeholder="Enter watchlist name" maxlength="128" required>
                                <div class="form-text">Alphanumeric characters and spaces only, max 128 characters</div>
                            </div>
                            <div class="mb-3">
                                <label for="watchlistDescription" class="form-label">Description <span
                                        class="text-muted">(Optional)</span></label>
                                <textarea class="form-control" id="watchlistDescription" name="description"
                                    placeholder="Enter a brief description (max 265 characters)" maxlength="265"
                                    rows="3"></textarea>
                                <div class="form-text">
                                    <span id="charCount">0</span>/265 characters
                                </div>
                            </div>
                            <div class="error-message" id="errorMessage"></div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Create WatchList</button>
                                <a href="/watchlists" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script>
        function validateWatchListName(name) {
            if (!name || !name.trim()) {
                return { valid: false, error: "WatchList name cannot be empty" };
            }

            if (name.length > 128) {
                return { valid: false, error: "WatchList name cannot exceed 128 characters" };
            }

            // Check if name contains only alphanumeric and spaces
            if (!/^[a-zA-Z0-9\s]+$/.test(name)) {
                return { valid: false, error: "WatchList name can only contain alphanumeric characters and spaces" };
            }

            return { valid: true };
        }

        // Character counter for description
        document.addEventListener('DOMContentLoaded', function () {
            const descriptionInput = document.getElementById('watchlistDescription');
            const charCount = document.getElementById('charCount');

            if (descriptionInput && charCount) {
                descriptionInput.addEventListener('input', function () {
                    charCount.textContent = this.value.length;
                });
            }
        });

        async function handleSubmit(event) {
            event.preventDefault();
            const errorMessage = document.getElementById('errorMessage');
            const watchlistNameInput = document.getElementById('watchlistName');
            const watchlistName = watchlistNameInput.value.trim();

            // Hide previous error
            errorMessage.style.display = 'none';

            // Validate watchlist name
            const validation = validateWatchListName(watchlistName);
            if (!validation.valid) {
                errorMessage.textContent = validation.error;
                errorMessage.style.display = 'block';
                return;
            }

            // Disable submit button
            const submitButton = event.target.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Creating...';

            const descriptionInput = document.getElementById('watchlistDescription');
            const description = descriptionInput.value.trim();

            try {
                const response = await fetch('/v1/watchlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        watchlist_name: watchlistName,
                        description: description || null
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to create watchlist');
                }

                // Redirect to watchlist details page
                window.location.href = `/watchlist/${data.watchlist_id}`;
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                submitButton.disabled = false;
                submitButton.textContent = 'Create WatchList';
            }
        }
    </script>
</body>

</html>
