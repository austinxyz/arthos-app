<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand" href="/" style="font-size: 1.5rem; font-weight: 400; color: #4285f4 !important;">Arthos</a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav items -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'watchlists' %}active fw-bold{% endif %}"
                        href="/watchlists">WatchLists</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'options' %}active fw-bold{% endif %}"
                        href="/rr-list">Options</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if current_page == 'portfolios' %}active fw-bold{% endif %}"
                        href="/portfolios">Portfolios <span class="badge bg-warning text-dark ms-1" style="font-size: 0.65rem;">Coming Soon</span></a>
                </li>
            </ul>

            <!-- Auth section (right side) -->
            <div class="d-flex align-items-center">
                {% if request.session.get('account_id') %}
                <!-- Logged in: show user info and logout -->
                <div class="d-flex align-items-center gap-2">
                    {% if request.session.get('user', {}).get('picture') %}
                    <img src="{{ request.session.get('user', {}).get('picture') }}" alt="Profile"
                        class="rounded-circle" style="width: 32px; height: 32px;">
                    {% endif %}
                    <span class="text-light fw-medium d-none d-md-inline">
                        {{ request.session.get('user', {}).get('name', 'User') }}
                    </span>
                    <a href="/logout" class="btn btn-outline-light btn-sm ms-2">Sign Out</a>
                </div>
                {% else %}
                <!-- Not logged in: show login/signup -->
                <div class="d-flex gap-2">
                    <a href="/login" class="btn btn-outline-light btn-sm">Login</a>
                    <a href="/login" class="btn btn-light btn-sm">Sign Up</a>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
