[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    # Speed/Layer markers (for intelligent test selection)
    unit: Unit tests - pure logic, no I/O (fast: <1s each)
    integration: Integration tests - database, external services (medium: 1-5s)
    api: FastAPI endpoint tests (medium: 1-3s)
    browser: Browser-based tests using Playwright (slow: 5-30s each)
    e2e: End-to-end tests that require a running server

    # Feature markers (for targeted testing)
    watchlist: Watchlist-related functionality
    stock_data: Stock data fetching and processing
    options: Options analysis (covered calls, risk reversals)
    auth: Authentication and authorization
    scheduler: Background job scheduler
    llm: LLM integration and AI features
    providers: Data provider abstraction layer

    # Special markers
    slow: Tests that take >10 seconds
    smoke: Critical smoke tests (must always pass)

# Note: pytest-random-order is installed but configured via command line
# Run with: pytest --random-order to catch test order dependencies
